<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Animal Crossing</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <div id="game-area">
    <div id="game-info">
      Clochettes :<span id="score">0</span>/15 | Vies : <span id="lives">3</span>
    </div>

    <img src="filet.png" id="net" alt="Filet">

    <div id="game-over">
      <h2 id="status-text"></h2>
      <p>Score : <span id="final-score">0</span></p>
      <div id="promo-container" style="display:none;">
        <p>Ton code de réduction :</p>
        <div id="promo-code"></div>
      </div>
      <button onclick="location.reload()">Rejouer</button>
    </div>
  </div>


</body>

</html>

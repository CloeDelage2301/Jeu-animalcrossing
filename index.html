<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Crossing</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <div class="game-area">
    <div class="game-info">
      Clochettes : <span class="score">0</span>/15 | Vies : <span class="lives">3</span>
    </div>

    <img src="filet.png" class="net" alt="Filet">

    <div class="game-over">
      <h2 class="status-text"></h2>
      <p>Score : <span class="final-score">0</span></p>
      <div class="promo-container" style="display:none;">
        <p>Ton code de réduction :</p>
        <div class="promo-code"></div>
        <button class="copy-btn" onclick="copyCode()">Copier</button>
      </div>
      <button onclick="location.reload()">Rejouer</button>
    </div>
  </div>



</body>

</html>
